name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - uses: android-actions/setup-android@v2
    - name: Build APK
      run: |
        cd PokerGame
        chmod +x gradlew
        ./gradlew assembleDebug        
    - uses: actions/upload-artifact@v4
      with:
        name: poker-apk
        path: PokerGame/app/build/outputs/apk/debug/app-debug.apk
